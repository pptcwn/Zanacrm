name: Deploy to Google Compute Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: zanacrm

jobs:
  quality:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build variables
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"

      - name: Run tests
        run: npm test

      - name: Build Next.js app
        run: npm run build

  image:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      image: ${{ steps.image.outputs.image }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$ARTIFACT_REGISTRY_REPOSITORY"
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        id: image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${APP_NAME}:${GITHUB_SHA}"
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --tag "$IMAGE" \
            --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${APP_NAME}:main" \
            .
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.image }}"
          docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${APP_NAME}:main"

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: image
    environment: production
    env:
      GCE_INSTANCE_NAME: ${{ vars.GCE_INSTANCE_NAME }}
      GCE_ZONE: ${{ vars.GCE_ZONE }}
      GCE_SSH_USERNAME: ${{ vars.GCE_SSH_USERNAME }}
    steps:
      - name: Validate VM variables
        run: |
          test -n "$GCE_INSTANCE_NAME"
          test -n "$GCE_ZONE"
          test -n "$GCE_SSH_USERNAME"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy image on Compute Engine
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ env.GCE_INSTANCE_NAME }}
          zone: ${{ env.GCE_ZONE }}
          user: ${{ env.GCE_SSH_USERNAME }}
          ssh_private_key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          command: |
            sudo /opt/zanacrm/deploy.sh '${{ needs.image.outputs.image }}'
